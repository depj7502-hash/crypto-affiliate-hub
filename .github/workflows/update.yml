name: Money Machine - Full Automation

on:
  schedule:
    - cron: '0 */6 * * *'     # Обновление данных каждые 6 часов
    - cron: '0 */3 * * *'     # Telegram пост каждые 3 часа
    - cron: '0 9 * * *'       # Pinterest пин каждый день в 9:00
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Update Data
        run: python update_data.py

      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MEXC_LINK: ${{ secrets.MEXC_LINK }}
          BYBIT_LINK: ${{ secrets.BYBIT_LINK }}
        run: python telegram_poster.py

      - name: Post to Pinterest (daily)
        if: github.event.schedule == '0 9 * * *'
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python pinterest_poster.py

      - name: Commit updated data.json + OG image
        run: |
          git config --global user.name 'AutoBot'
          git config --global user.email 'bot@money.auto'
          git add data.json og-image.jpg || true
          git diff --staged --quiet || git commit -m "auto: [$(date +'%Y-%m-%d %H:%M')] update data"
          git push
