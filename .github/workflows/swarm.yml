name: Autonomous Swarm AI

on:
  schedule:
    - cron: '0 8 * * *' # Every day at 8 AM UTC
    - cron: '0 20 * * *' # Every day at 8 PM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Swarm Orchestrator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MEXC_LINK: ${{ secrets.MEXC_LINK }}
          BYBIT_LINK: ${{ secrets.BYBIT_LINK }}
          BINANCE_LINK: ${{ secrets.BINANCE_LINK }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: cd swarm && python manager.py

      - name: Upload Daily Content output
        uses: actions/upload-artifact@v3
        with:
          name: daily-content
          path: swarm/daily_content.json

      - name: Update Memory on GitHub
        run: |
          git config --global user.name 'Swarm AI'
          git config --global user.email 'swarm@automation.local'
          git add swarm/memory.json
          git commit -m "chore: Swarm updated memory banks" || echo "No changes to memory"
          git push
